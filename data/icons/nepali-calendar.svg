<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F03248"/>
      <stop offset="100%" stop-color="#B8102A"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A0A1E"/>
      <stop offset="100%" stop-color="#6E0818"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e8e8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Outer card -->
  <rect x="6" y="6" width="116" height="116" rx="22" ry="22"
        fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Header band -->
  <rect x="6" y="6" width="116" height="36" rx="22" ry="22" fill="url(#headerGrad)"/>
  <rect x="6" y="24" width="116" height="18" fill="url(#headerGrad)"/>

  <!-- Binding rings -->
  <circle cx="36" cy="9" r="5.5" fill="none" stroke="white" stroke-width="2.2" opacity="0.55"/>
  <circle cx="92" cy="9" r="5.5" fill="none" stroke="white" stroke-width="2.2" opacity="0.55"/>

  <!-- पात्रो header label -->
  <text x="64" y="31"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="15" font-weight="700"
        fill="white" opacity="0.95"
        letter-spacing="1">पात्रो</text>

  <!-- Weekday mini-dots row -->
  <circle cx="24"  cy="50" r="2" fill="white" opacity="0.30"/>
  <circle cx="43"  cy="50" r="2" fill="white" opacity="0.30"/>
  <circle cx="62"  cy="50" r="2" fill="white" opacity="0.30"/>
  <circle cx="81"  cy="50" r="2" fill="white" opacity="0.30"/>
  <circle cx="100" cy="50" r="2" fill="white" opacity="0.30"/>

  <!-- TODAY circle — prominent, centered slightly left -->
  <circle cx="46" cy="74" r="17" fill="url(#circleGrad)" opacity="0.97"/>

  <!-- Today numeral in circle -->
  <text x="46" y="80"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="17" font-weight="800"
        fill="#B8102A">१५</text>

  <!-- Adjacent day numbers (muted) -->
  <text x="24"  y="74"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.50">१४</text>
  <text x="81"  y="74"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.50">१६</text>
  <text x="100" y="74"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.30">१७</text>

  <!-- Row below -->
  <text x="24"  y="100"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.28">२१</text>
  <text x="46"  y="100"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.28">२२</text>
  <text x="81"  y="100"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.28">२३</text>
  <text x="100" y="100"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="12" fill="white" opacity="0.15">२४</text>

  <!-- Subtle bottom row fade -->
  <text x="24"  y="118"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="11" fill="white" opacity="0.12">२८</text>
  <text x="46"  y="118"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="11" fill="white" opacity="0.12">२९</text>
  <text x="81"  y="118"
        text-anchor="middle"
        font-family="Noto Sans Devanagari, sans-serif"
        font-size="11" fill="white" opacity="0.08">३०</text>
</svg>
