<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="88" height="88" rx="16" ry="16" fill="#DC143C"/>
  <!-- Calendar header strip -->
  <rect x="4" y="4" width="88" height="30" rx="16" ry="16" fill="#B01030"/>
  <rect x="4" y="18" width="88" height="16" fill="#B01030"/>
  <!-- Calendar grid lines (horizontal) -->
  <rect x="12" y="42" width="72" height="1.5" fill="white" opacity="0.3"/>
  <rect x="12" y="58" width="72" height="1.5" fill="white" opacity="0.3"/>
  <rect x="12" y="74" width="72" height="1.5" fill="white" opacity="0.3"/>
  <!-- Calendar grid lines (vertical) -->
  <rect x="27" y="34" width="1.5" height="52" fill="white" opacity="0.3"/>
  <rect x="48" y="34" width="1.5" height="52" fill="white" opacity="0.3"/>
  <rect x="69" y="34" width="1.5" height="52" fill="white" opacity="0.3"/>
  <!-- Today circle highlight -->
  <circle cx="38" cy="50" r="9" fill="white" opacity="0.9"/>
  <!-- Devanagari-style numeral hint inside circle -->
  <text x="38" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC143C" font-family="sans-serif">१</text>
  <!-- Header text: month hint dots -->
  <text x="48" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="sans-serif">पात्रो</text>
  <!-- Corner ring indicators -->
  <circle cx="22" cy="10" r="4" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
  <circle cx="74" cy="10" r="4" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
</svg>
